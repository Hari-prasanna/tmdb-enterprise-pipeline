services:
  db:
    image: postgres:15
    container_name: luu_postgres
    environment:
      POSTGRES_USER: hp_admin
      POSTGRES_PASSWORD: zalando_password123
      POSTGRES_DB: luu_warehouse
    ports:
      - "5433:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: