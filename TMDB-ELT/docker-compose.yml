services:
  db:
    image: postgres:15
    container_name: tmdb_postgres
    environment:
      POSTGRES_USER: hari
      POSTGRES_PASSWORD: "0115"
      POSTGRES_DB: TMDB_movies
    ports:
      - "5434:5432" 
    volumes:
      - tmdb_postgres_data:/var/lib/postgresql/data

volumes:
  tmdb_postgres_data: